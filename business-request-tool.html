<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업무 요청 분석·회신 초안 작성 도구</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 12px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            min-height: 120px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ee5a52;
        }

        .analysis-result {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 20px;
        }

        .result-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #667eea;
        }

        .result-label {
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .result-value {
            font-size: 14px;
            color: #333;
            word-break: break-word;
        }

        .reply-draft {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 6px;
            margin-top: 16px;
            min-height: 100px;
        }

        .reply-draft textarea {
            background: white;
            margin-top: 10px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-sent {
            background: #d1ecf1;
            color: #0c5460;
        }

        .dashboard {
            margin-top: 20px;
        }

        .request-list {
            list-style: none;
        }

        .request-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 3px solid #667eea;
            cursor: pointer;
            transition: background 0.2s;
        }

        .request-item:hover {
            background: #e9ecef;
        }

        .request-title {
            font-weight: 600;
            font-size: 14px;
            color: #333;
            margin-bottom: 4px;
        }

        .request-meta {
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }

        .api-key-section {
            background: #fff3cd;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 12px;
            color: #856404;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .api-setup-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .api-setup-modal.hidden {
            display: none;
        }

        .api-setup-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .api-setup-box h3 {
            font-size: 20px;
            margin-bottom: 16px;
            color: #333;
        }

        .api-setup-box p {
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .api-setup-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            font-family: 'Monaco', 'Menlo', monospace;
        }

        .api-setup-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .api-setup-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .api-setup-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .api-setup-box a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .api-setup-box a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            background: #667eea;
            color: white;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 6px;
        }

        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- API 키 설정 모달 -->
    <div id="apiSetupModal" class="api-setup-modal">
        <div class="api-setup-box">
            <h3>🔑 Claude API 키 설정</h3>
            <p>업무 요청 분석을 위해 Claude API 키가 필요합니다.</p>
            <p>🔗 <a href="https://console.anthropic.com/account/keys" target="_blank">여기서 API 키 발급받기</a></p>
            <input type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off">
            <button onclick="saveApiKey()">저장하고 시작</button>
            <p style="font-size: 12px; color: #999; text-align: center; margin-top: 16px;">
                API 키는 이 브라우저에만 저장됩니다 (서버에 전송 없음)
            </p>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>📧 업무 요청 분석·회신 초안 작성</h1>
            <p>AI가 당신의 업무 요청을 분석하고 전문적인 회신 초안을 작성해드립니다</p>
        </header>

        <div class="main-layout">
            <!-- 좌측: 입력 및 분석 패널 -->
            <div class="card">
                <h2>📝 요청 입력</h2>

                <div id="errorMessage" class="error hidden"></div>
                <div id="successMessage" class="success hidden"></div>

                <div class="input-group">
                    <label>업무 요청 내용</label>
                    <textarea id="requestText" placeholder="이메일, 채팅, 메시지 등의 요청 내용을 여기에 붙여넣으세요..."></textarea>
                </div>

                <div class="input-group">
                    <label>요청자 정보 (선택사항)</label>
                    <input type="text" id="requesterName" placeholder="이름 또는 부서">
                </div>

                <div class="input-group">
                    <label>기본 톤 선택</label>
                    <select id="tonStyle">
                        <option value="professional">정중한 전문가 톤</option>
                        <option value="friendly">친근하고 협력적인 톤</option>
                        <option value="formal">격식적인 톤</option>
                        <option value="casual">편안한 톤</option>
                    </select>
                </div>

                <div class="button-group">
                    <button class="btn-primary" id="analyzeBtn" onclick="analyzeRequest()">분석 시작</button>
                    <button class="btn-secondary" id="clearBtn" onclick="clearForm()">초기화</button>
                </div>
            </div>

            <!-- 우측: 분석 결과 및 회신 초안 -->
            <div class="card">
                <h2>📊 분석 결과 및 회신 초안</h2>

                <div id="analysisContent" class="hidden">
                    <div class="analysis-result">
                        <div class="result-item">
                            <div class="result-label">요청 유형</div>
                            <div class="result-value" id="requestType">-</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">긴급도</div>
                            <div class="result-value" id="urgency">-</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">마감일</div>
                            <div class="result-value" id="deadline">-</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">핵심 내용</div>
                            <div class="result-value" id="keyPoint">-</div>
                        </div>
                    </div>

                    <div class="reply-draft">
                        <label>✏️ 회신 초안 (수정 가능)</label>
                        <textarea id="replyDraft"></textarea>
                        <div class="button-group" style="margin-top: 12px;">
                            <button class="btn-primary" onclick="copyToClipboard()">복사</button>
                            <button class="btn-secondary" onclick="saveRequest()">저장</button>
                            <button class="btn-danger" onclick="clearAnalysis()">삭제</button>
                        </div>
                    </div>
                </div>

                <div id="noAnalysis" style="text-align: center; color: #999; padding: 40px 20px;">
                    <div style="font-size: 48px; margin-bottom: 12px;">📭</div>
                    <p>요청을 입력하고 분석 버튼을 클릭하세요</p>
                </div>
            </div>
        </div>

        <!-- 대시보드 -->
        <div class="card dashboard">
            <h2>📋 요청 히스토리</h2>
            <div class="button-group" style="margin-bottom: 16px;">
                <input type="text" id="searchInput" placeholder="검색..." style="flex: 1;">
                <button class="btn-secondary" onclick="loadRequests()">새로고침</button>
                <button class="btn-danger" onclick="clearAllHistory()">전체 삭제</button>
            </div>
            <ul class="request-list" id="requestList">
                <div style="text-align: center; color: #999; padding: 20px;">저장된 요청이 없습니다</div>
            </ul>
        </div>
    </div>

    <script>
        let CONFIG = null;
        const STORAGE_KEY = 'businessRequests';
        const API_ENDPOINT = 'https://api.anthropic.com/v1/messages';

        // 설정 로드
        async function loadConfig() {
            try {
                const response = await fetch('config.local.json');
                if (response.ok) {
                    CONFIG = await response.json();
                    if (CONFIG.claudeApiKey && CONFIG.claudeApiKey.trim() !== '') {
                        localStorage.setItem('claudeApiKey', CONFIG.claudeApiKey);
                        return true;
                    }
                }
            } catch (error) {
                // config.local.json이 없으면 무시
            }

            const savedKey = localStorage.getItem('claudeApiKey');
            if (savedKey && savedKey.trim() !== '') {
                CONFIG = {
                    claudeApiKey: savedKey,
                    model: 'claude-sonnet-4-6',
                    maxTokens: 1024
                };
                return true;
            }

            return false;
        }

        // API 키 저장
        function saveApiKey() {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            if (!apiKey) {
                alert('API 키를 입력하세요');
                return;
            }

            if (!apiKey.startsWith('sk-ant-')) {
                alert('올바른 Claude API 키 형식이 아닙니다');
                return;
            }

            localStorage.setItem('claudeApiKey', apiKey);
            CONFIG = {
                claudeApiKey: apiKey,
                model: 'claude-sonnet-4-6',
                maxTokens: 1024
            };
            document.getElementById('apiSetupModal').classList.add('hidden');
        }

        // 분석 요청
        async function analyzeRequest() {
            const requestText = document.getElementById('requestText').value.trim();
            const requesterName = document.getElementById('requesterName').value.trim();
            const tonStyle = document.getElementById('tonStyle').value;

            // 검증
            if (!CONFIG || !CONFIG.claudeApiKey) {
                showError('API 키가 설정되지 않았습니다');
                return;
            }
            if (!requestText) {
                showError('요청 내용을 입력하세요');
                return;
            }

            const analyzeBtn = document.getElementById('analyzeBtn');
            const originalText = analyzeBtn.textContent;
            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '<span class="loading"></span> 분석 중...';

            try {
                const systemPrompt = `당신은 업무 요청 분석 전문가입니다. 다음 업무 요청을 분석하고 JSON 형식으로 응답하세요.

분석 항목:
1. requestType: 요청 유형 (정보 요청, 승인 요청, 작업 할당, 피드백 요청, 회의 제안, 기타)
2. urgency: 긴급도 (높음/중간/낮음)
3. deadline: 마감일 (명시된 경우) 또는 추정 시간
4. keyPoint: 핵심 내용 (한 문장)
5. requiredInfo: 필요한 정보나 조치 (배열)

응답은 다음과 같은 JSON 형식이어야 합니다:
{
  "requestType": "...",
  "urgency": "...",
  "deadline": "...",
  "keyPoint": "...",
  "requiredInfo": [...]
}

다른 텍스트는 포함하지 말고 JSON만 반환하세요.`;

                const analysisResponse = await callClaudeAPI(
                    CONFIG.claudeApiKey,
                    systemPrompt,
                    requestText
                );

                const analysis = parseJSON(analysisResponse);

                // 회신 초안 생성
                const replyPrompt = generateReplyPrompt(analysis, tonStyle, requesterName);
                const replyDraft = await callClaudeAPI(CONFIG.claudeApiKey, replyPrompt, requestText);

                // UI 업데이트
                displayAnalysis(analysis, replyDraft);
                showSuccess('요청이 성공적으로 분석되었습니다');

            } catch (error) {
                showError('분석 중 오류가 발생했습니다: ' + error.message);
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.textContent = originalText;
            }
        }

        // Claude API 호출
        async function callClaudeAPI(apiKey, systemPrompt, userMessage) {
            const response = await fetch(API_ENDPOINT, {
                method: 'POST',
                headers: {
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'content-type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-6',
                    max_tokens: 1024,
                    system: systemPrompt,
                    messages: [{
                        role: 'user',
                        content: userMessage
                    }]
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'API 호출 실패');
            }

            const data = await response.json();
            return data.content[0].text;
        }

        // 회신 프롬프트 생성
        function generateReplyPrompt(analysis, tonStyle, requesterName) {
            const toneGuide = {
                professional: '정중하고 전문적인 톤으로, 명확하고 간결하게',
                friendly: '친근하면서도 전문적인 톤으로, 협력의 의지를 표현하며',
                formal: '격식을 갖춘 톤으로, 존댓말을 사용하여',
                casual: '편안하고 자연스러운 톤으로, 팀 내 친구처럼'
            };

            return `당신은 전문적인 비즈니스 커뮤니케이션 전문가입니다.

다음 업무 요청에 대해 회신 초안을 작성하세요:
- 요청 유형: ${analysis.requestType}
- 긴급도: ${analysis.urgency}
- 마감일: ${analysis.deadline}
- 핵심 내용: ${analysis.keyPoint}

회신 작성 가이드:
1. 톤: ${toneGuide[analysis.tonStyle] || toneGuide.professional}
2. 구조: 인사 → 핵심 답변 → 필요한 조치 → 종료
3. 길이: 3-5 문장 정도
4. 마감일이 가까우면 신속한 처리 의지 표현
${requesterName ? `5. 요청자: ${requesterName}` : ''}

전문적이고 명확한 회신을 작성하세요. 회신 본문만 작성하고 '안녕하세요' 같은 인사로 시작하세요.`;
        }

        // JSON 파싱
        function parseJSON(text) {
            try {
                const jsonMatch = text.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw new Error('JSON을 찾을 수 없습니다');
                return JSON.parse(jsonMatch[0]);
            } catch (e) {
                return {
                    requestType: '분석 중 오류',
                    urgency: '-',
                    deadline: '-',
                    keyPoint: text.substring(0, 100),
                    requiredInfo: []
                };
            }
        }

        // 분석 결과 표시
        function displayAnalysis(analysis, replyDraft) {
            document.getElementById('noAnalysis').classList.add('hidden');
            document.getElementById('analysisContent').classList.remove('hidden');

            document.getElementById('requestType').textContent = analysis.requestType || '-';
            document.getElementById('urgency').textContent = analysis.urgency || '-';
            document.getElementById('deadline').textContent = analysis.deadline || '-';
            document.getElementById('keyPoint').textContent = analysis.keyPoint || '-';
            document.getElementById('replyDraft').value = replyDraft;

            // 분석 데이터 저장
            window.currentAnalysis = {
                analysis,
                replyDraft,
                timestamp: new Date().toISOString()
            };
        }

        // 회신 초안 복사
        function copyToClipboard() {
            const text = document.getElementById('replyDraft').value;
            if (!text) return;

            navigator.clipboard.writeText(text).then(() => {
                showSuccess('회신 초안이 복사되었습니다');
            });
        }

        // 요청 저장
        function saveRequest() {
            const requestText = document.getElementById('requestText').value;
            if (!requestText) {
                showError('저장할 요청이 없습니다');
                return;
            }

            const requests = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const newRequest = {
                id: Date.now(),
                text: requestText.substring(0, 100),
                fullText: requestText,
                analysis: window.currentAnalysis?.analysis || null,
                reply: document.getElementById('replyDraft').value,
                status: 'completed',
                timestamp: new Date().toISOString()
            };

            requests.push(newRequest);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(requests));
            loadRequests();
            showSuccess('요청이 저장되었습니다');
        }

        // 요청 목록 로드
        function loadRequests() {
            const requests = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = requests.filter(r => r.text.toLowerCase().includes(searchTerm));

            const list = document.getElementById('requestList');
            if (filtered.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">저장된 요청이 없습니다</div>';
                return;
            }

            list.innerHTML = filtered.reverse().map(req => `
                <li class="request-item" onclick="loadRequest('${req.id}')">
                    <div class="request-title">${escapeHtml(req.text)}</div>
                    <div class="request-meta">
                        <span><span class="badge">${req.status}</span>${formatDate(req.timestamp)}</span>
                        <span style="cursor: pointer; color: #ff6b6b;" onclick="deleteRequest(event, '${req.id}')">🗑️</span>
                    </div>
                </li>
            `).join('');
        }

        // 요청 로드
        function loadRequest(id) {
            const requests = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const request = requests.find(r => r.id == id);
            if (!request) return;

            document.getElementById('requestText').value = request.fullText;
            document.getElementById('replyDraft').value = request.reply;

            if (request.analysis) {
                displayAnalysis(request.analysis, request.reply);
            }
        }

        // 요청 삭제
        function deleteRequest(event, id) {
            event.stopPropagation();
            if (!confirm('삭제하시겠습니까?')) return;

            let requests = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            requests = requests.filter(r => r.id != id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(requests));
            loadRequests();
            showSuccess('삭제되었습니다');
        }

        // 전체 히스토리 삭제
        function clearAllHistory() {
            if (!confirm('모든 히스토리를 삭제하시겠습니까? 복구할 수 없습니다.')) return;
            localStorage.removeItem(STORAGE_KEY);
            loadRequests();
            showSuccess('모든 히스토리가 삭제되었습니다');
        }

        // 폼 초기화
        function clearForm() {
            document.getElementById('requestText').value = '';
            document.getElementById('requesterName').value = '';
            document.getElementById('tonStyle').value = 'professional';
            clearAnalysis();
        }

        // 분석 결과 초기화
        function clearAnalysis() {
            document.getElementById('noAnalysis').classList.remove('hidden');
            document.getElementById('analysisContent').classList.add('hidden');
            document.getElementById('replyDraft').value = '';
            clearMessages();
        }

        // 메시지 표시
        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = '❌ ' + message;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            el.textContent = '✅ ' + message;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        function clearMessages() {
            document.getElementById('errorMessage').classList.add('hidden');
            document.getElementById('successMessage').classList.add('hidden');
        }

        // 유틸리티
        function formatDate(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return '방금 전';
            if (minutes < 60) return `${minutes}분 전`;
            if (hours < 24) return `${hours}시간 전`;
            if (days < 7) return `${days}일 전`;

            return date.toLocaleDateString('ko-KR');
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // 초기 로드
        document.addEventListener('DOMContentLoaded', () => {
            // API 키 설정 확인
            loadConfig().then(success => {
                if (!success) {
                    document.getElementById('apiSetupModal').classList.remove('hidden');
                }
            });

            loadRequests();

            // 엔터 키로 API 키 저장
            document.getElementById('apiKeyInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') saveApiKey();
            });

            // 검색 실시간 필터링
            document.getElementById('searchInput').addEventListener('input', loadRequests);
        });
    </script>
</body>
</html>
